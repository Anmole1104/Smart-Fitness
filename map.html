<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Fitness Route Advisor</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body, html { height: 100%; width: 100%; }

    /* Header */
    #header {
      background: linear-gradient(135deg, #4285f4, #34a853);
      padding: 15px 25px;
      color: white;
      font-size: 22px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    #logout {
      background: white;
      color: #4285f4;
      border: none;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    #logout:hover {
      background: #4285f4;
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transform: scale(1.05);
    }

    /* Info Panel */
    #info {
      position: absolute;
      top: 90px;
      left: 20px;
      z-index: 10;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      max-width: 300px;
      transition: all 0.3s ease;
    }

    #info:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.3);
    }

    #info select {
      padding: 8px 12px;
      border-radius: 10px;
      border: 2px solid #4285f4;
      outline: none;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    #info select:hover {
      border-color: #34a853;
    }

    #details {
      margin-top: 15px;
      font-size: 14px;
      line-height: 1.6;
      color: #333;
    }

    #details b { color: #4285f4; }

    /* Map */
    #map {
      height: 100%;
      width: 100%;
    }

  </style>
</head>
<body>
  <!-- Header -->
  <div id="header">
    <span>🚴 Smart Fitness Route Advisor</span>
    <button id="logout" onclick="logout()">Logout</button>
  </div>

  <!-- Info panel -->
  <div id="info">
    <label for="mode"><b>Choose Mode:</b></label>
    <select id="mode">
      <option value="WALKING">🚶 Walking</option>
      <option value="BICYCLING">🚴 Cycling</option>
    </select>
    <div id="details">👉 Click on the map to select Start & Destination.</div>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <script>
    let map, directionsService, directionsRenderer;
    let clicks = [];

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 28.6139, lng: 77.2090 },
        zoom: 7,
        styles: [ // subtle custom styling
          { elementType: "geometry", stylers: [{ color: "#f5f5f5" }] },
          { elementType: "labels.icon", stylers: [{ visibility: "off" }] },
          { elementType: "labels.text.fill", stylers: [{ color: "#616161" }] },
          { elementType: "labels.text.stroke", stylers: [{ color: "#f5f5f5" }] },
          {
            featureType: "road",
            elementType: "geometry",
            stylers: [{ color: "#ffffff" }]
          },
          {
            featureType: "water",
            elementType: "geometry",
            stylers: [{ color: "#c9e6ff" }]
          }
        ]
      });

      directionsService = new google.maps.DirectionsService();
      directionsRenderer = new google.maps.DirectionsRenderer({
        map: map,
        polylineOptions: { strokeColor: "#4285f4", strokeWeight: 5 }
      });

      map.addListener("click", (e) => {
        clicks.push(e.latLng);

        if (clicks.length === 2) {
          calculateRoute();
          clicks = [];
        }
      });
    }

    function calculateRoute() {
      const mode = document.getElementById("mode").value;
      directionsService.route(
        {
          origin: clicks[0],
          destination: clicks[1],
          travelMode: google.maps.TravelMode[mode],
        },
        (response, status) => {
          if (status === "OK") {
            directionsRenderer.setDirections(response);
            const route = response.routes[0].legs[0];
            showDetails(route, mode);
          } else {
            alert("Route request failed: " + status);
          }
        }
      );
    }

    function showDetails(route, mode) {
      const distance = route.distance.value / 1000;
      const time = route.duration.text;

      let calories = 0;
      if (mode === "WALKING") calories = distance * 50;
      else if (mode === "BICYCLING") calories = distance * 30;

      document.getElementById("details").innerHTML = `
        <b>From:</b> ${route.start_address} <br>
        <b>To:</b> ${route.end_address} <br>
        <b>Distance:</b> ${distance.toFixed(2)} km <br>
        <b>Duration:</b> ${time} <br>
        <b>Calories Burned:</b> ${calories.toFixed(0)} kcal
      `;
    }

    function logout() {
      window.location.href = "index.html";
    }
  </script>

  <!-- Google Maps API -->
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA3azz-nQIVem15Oj60zz3h9-4yZJgKLsA&libraries=places&callback=initMap">
  </script>
</body>
</html>
